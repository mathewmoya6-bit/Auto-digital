<!-- ─── PAYMENT MODAL ─── -->
<div class="modal" id="paymentModal">
    <div class="modal-content">
        <button class="close-btn" onclick="closePaymentModal()">✕</button>
        <h2>💳 Pay with M-Pesa</h2>
        <p class="sub">Complete payment to unlock this service.</p>
        <div class="payment-summary">
            <div class="row"><span class="label">Service</span><span class="value" id="paymentServiceName">—</span></div>
            <div class="row"><span class="label">Amount</span><span class="value" id="paymentAmount">KES 0</span></div>
            <div class="row total"><span class="label">Total</span><span class="value" id="paymentTotal">KES 0</span></div>
        </div>
        <div class="form-group">
            <label>M-Pesa Phone Number</label>
            <div class="phone-input">
                <span>+254</span>
                <input 
                    type="tel" 
                    id="mpesaPhone" 
                    placeholder="712345678" 
                    autocomplete="off"
                    value=""
                    maxlength="10"
                    inputmode="numeric"
                    pattern="[0-9]*"
                />
            </div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">
                Enter your Safaricom number registered with M-Pesa (e.g., 712345678)
            </div>
        </div>
        <button class="btn btn-primary btn-block" onclick="processPayment()" id="payNowBtn">
            💳 Pay Now
        </button>
        <button class="btn btn-outline btn-block" style="margin-top:8px;" onclick="closePaymentModal()">
            Cancel
        </button>
    </div>
</div>
