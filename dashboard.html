    <script>
        // ════════════════════════════════════════════════════════════════
        // AUTO-D KENYA - DASHBOARD (FIXED CORS)
        // ════════════════════════════════════════════════════════════════

        (function() {
            'use strict';

            // ─── Configuration ──────────────────────────────────────────
            // ─── FIX: Use the custom domain API_BASE ──────────────────
            const API_BASE = 'https://auto-digital.meipressgroup.com/api/v1';
            // Fallback to Render if custom domain fails
            // const API_BASE = 'https://auto-digital.onrender.com/api/v1';
            
            const SUPABASE_URL = 'https://xgkdbithhlvoqjnqvfmj.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhna2RiaXRoaGx2b3FqbnF2Zm1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NTE4NzQsImV4cCI6MjA5ODIyNzg3NH0.-4P2aQAlDl_4oW0C18gh7cEBzoIKeiLUmMnITz-Nt9Y';

            const SERVICE_ROUTES = {
                'mileage': '/mileage.html',
                'valuation': '/instant-value.html',
                'ownership': '/ownership-cost.html',
                'full_report': '/full-report.html'
            };

            const SERVICE_NAMES = {
                'mileage': 'Mileage Calculator',
                'valuation': 'Instant Vehicle Value',
                'ownership': 'Ownership Cost Report',
                'full_report': 'Full Vehicle Report'
            };

            // ─── State ──────────────────────────────────────────────────
            let currentUser = null;
            let supabaseClient = null;
            let dashboardData = null;
            let selectedService = null;
            let isProcessingPayment = false;
            let checkoutRequestId = null;
            let pendingServiceRedirect = null;
            let pollTimer = null;
            let confirmAttempted = false;
            let pollingAttempts = 0;
            const MAX_POLLING_ATTEMPTS = 30;

            // ─── DOM Refs ──────────────────────────────────────────────
            const vehicleGrid = document.getElementById('vehicleGrid');
            const servicesGrid = document.getElementById('servicesGrid');
            const requestsList = document.getElementById('requestsList');
            const reportsList = document.getElementById('reportsList');
            const paymentsList = document.getElementById('paymentsList');
            const notificationsList = document.getElementById('notificationsList');

            // ============================================================
            // HELPERS
            // ============================================================

            function showToast(message, type) {
                type = type || 'info';
                const container = document.getElementById('toastContainer');
                if (!container) return;
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : 'ℹ️';
                toast.innerHTML = icon + ' ' + message;
                container.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(100px)';
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            }

            function escapeHtml(str) {
                if (!str) return '';
                return String(str).replace(/[&<>]/g, function(m) {
                    return { '&': '&amp;', '<': '&lt;', '>': '&gt;' } [m];
                });
            }

            function updateWorkflowStep(step) {
                const steps = ['step1', 'step2', 'step3', 'step4', 'step5'];
                steps.forEach((id, index) => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    el.className = 'workflow-step';
                    if (index + 1 === step) el.classList.add('active');
                    if (index + 1 < step) el.classList.add('done');
                });
            }

            function redirectToService(serviceId) {
                const route = SERVICE_ROUTES[serviceId];
                if (route) {
                    window.location.href = route;
                } else {
                    showToast('Service unlocked, but no route found.', 'warning');
                }
            }

            // ─── ─── FIX: Get auth token with better error handling ───
            async function getAuthToken() {
                try {
                    if (!supabaseClient) {
                        if (!initSupabase()) return null;
                    }
                    const { data: { session }, error } = await supabaseClient.auth.getSession();
                    if (error) throw error;
                    if (session?.access_token) {
                        return session.access_token;
                    }
                    const stored = localStorage.getItem('auto_d_user');
                    if (stored) {
                        try {
                            const user = JSON.parse(stored);
                            if (user?.access_token) return user.access_token;
                        } catch (e) { /* ignore */ }
                    }
                    return null;
                } catch (error) {
                    console.warn('⚠️ Auth token error:', error.message);
                    return null;
                }
            }

            async function requireAuthToken() {
                const token = await getAuthToken();
                if (!token) {
                    showToast('⚠️ Your session has expired. Please log in again.', 'error');
                    setTimeout(() => {
                        window.location.href = 'https://auto-d.meipressgroup.com/';
                    }, 1500);
                    return null;
                }
                return token;
            }

            // ============================================================
            // SUPABASE
            // ============================================================

            function initSupabase() {
                try {
                    if (typeof supabase === 'undefined') {
                        console.warn('⚠️ Supabase SDK not loaded');
                        return false;
                    }
                    const { createClient } = supabase;
                    supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    console.log('✅ Supabase client initialized');
                    return true;
                } catch (error) {
                    console.error('❌ Supabase init error:', error);
                    return false;
                }
            }

            async function supabaseRequest(table, select = '*', filters = {}, order = null) {
                try {
                    if (!supabaseClient) {
                        if (!initSupabase()) {
                            throw new Error('Supabase not initialized');
                        }
                    }
                    let query = supabaseClient.from(table).select(select);
                    Object.keys(filters).forEach(key => {
                        query = query.eq(key, filters[key]);
                    });
                    if (order) {
                        query = query.order(order.column, { ascending: order.ascending || false });
                    }
                    const { data, error } = await query;
                    if (error) throw error;
                    return data;
                } catch (error) {
                    console.error(`❌ Supabase query error (${table}):`, error);
                    throw error;
                }
            }

            // ============================================================
            // AUTH
            // ============================================================

            async function checkAuth() {
                try {
                    if (!supabaseClient) {
                        if (!initSupabase()) return false;
                    }
                    const { data: { session }, error } = await supabaseClient.auth.getSession();
                    if (error) throw error;
                    if (session?.user) {
                        currentUser = session.user;
                        const userData = {
                            ...session.user,
                            access_token: session.access_token
                        };
                        localStorage.setItem('auto_d_user', JSON.stringify(userData));
                        updateUserUI();
                        return true;
                    }
                    const stored = localStorage.getItem('auto_d_user');
                    if (stored) {
                        try {
                            const user = JSON.parse(stored);
                            currentUser = user;
                            updateUserUI();
                            return true;
                        } catch (e) { /* ignore */ }
                    }
                    return false;
                } catch (error) {
                    console.warn('⚠️ Auth check error:', error.message);
                    return false;
                }
            }

            function updateUserUI() {
                if (!currentUser) return;
                const meta = currentUser.user_metadata || {};
                const name = meta.full_name || meta.first_name || currentUser.email?.split('@')[0] || 'User';
                const userNameEl = document.getElementById('userName');
                const userAvatarEl = document.getElementById('userAvatar');
                const greetingTextEl = document.getElementById('greetingText');
                if (userNameEl) userNameEl.textContent = name;
                if (userAvatarEl) userAvatarEl.textContent = name.charAt(0).toUpperCase();
                if (greetingTextEl) greetingTextEl.textContent = `👋 Welcome back, ${name}!`;
            }

            // ============================================================
            // NAVIGATION
            // ============================================================

            window.navigateTo = function(section) {
                showToast(`📂 Navigating to ${section}...`, 'info');
            };

            window.navigateToService = function(serviceId) {
                console.log('🔍 navigateToService called with:', serviceId);
                
                if (!dashboardData || !dashboardData.services) {
                    showToast('Loading services, please wait...', 'warning');
                    loadDashboard().then(() => {
                        setTimeout(() => {
                            window.navigateToService(serviceId);
                        }, 500);
                    });
                    return;
                }

                const service = dashboardData.services.find(s => s.id === serviceId);
                if (!service) {
                    showToast('Service not found', 'error');
                    return;
                }

                const isPurchased = service.purchased || service.status === 'purchased' || service.status === 'active';

                if (isPurchased) {
                    const route = SERVICE_ROUTES[serviceId];
                    if (route) {
                        window.location.href = route;
                    } else {
                        showToast('Service route not found', 'error');
                    }
                } else {
                    pendingServiceRedirect = serviceId;
                    openPaymentModal(service);
                }
            };

            window.handleServiceAction = function(serviceId) {
                window.navigateToService(serviceId);
            };

            // ============================================================
            // LOAD DASHBOARD
            // ============================================================

            function setConnectionStatus(status, message) {
                const dot = document.getElementById('connectionDot');
                const text = document.getElementById('connectionText');
                if (dot) dot.className = 'dot ' + status;
                if (text) text.textContent = message;
            }

            // ─── ─── The rest of the functions remain the same ───

            // ============================================================
            // PAYMENT - Process Payment with CORS fixes
            // ============================================================

            // ─── ─── FIX: Process Payment with better CORS handling ───
            window.processPayment = async function() {
                const phoneEl = document.getElementById('mpesaPhone');
                const payBtn = document.getElementById('payNowBtn');
                const phoneWrapper = document.getElementById('phoneInputWrapper');

                // ─── Get raw value and clean ───
                let rawPhone = phoneEl ? phoneEl.value.trim() : '';
                console.log('Raw phone input:', rawPhone);

                if (!rawPhone || rawPhone === '' || rawPhone === 'e.g., 0700000000' || rawPhone === '0700000000') {
                    showToast('Please enter your M-Pesa phone number (e.g., 0700000000)', 'error');
                    if (phoneWrapper) phoneWrapper.classList.add('error');
                    if (phoneEl) {
                        phoneEl.focus();
                        phoneEl.value = '';
                    }
                    setTimeout(() => {
                        if (phoneWrapper) phoneWrapper.classList.remove('error');
                    }, 3000);
                    return;
                }

                let phone = rawPhone.replace(/[^0-9]/g, '');
                console.log('Cleaned phone:', phone);
                
                if (phone.startsWith('254')) {
                    phone = phone.substring(3);
                    console.log('After removing 254:', phone);
                }
                
                if (phone.startsWith('0')) {
                    phone = phone.substring(1);
                    console.log('After removing leading 0:', phone);
                }

                if (!phone || phone.length !== 9 || !phone.startsWith('7')) {
                    const errorMsg = phone.length > 0 
                        ? `Invalid number: "${rawPhone}". Please enter 10 digits starting with 07 (e.g., 0700000000)`
                        : 'Please enter your M-Pesa phone number (e.g., 0700000000)';
                    showToast(errorMsg, 'error');
                    if (phoneWrapper) phoneWrapper.classList.add('error');
                    if (phoneEl) {
                        phoneEl.focus();
                        phoneEl.select();
                    }
                    setTimeout(() => {
                        if (phoneWrapper) phoneWrapper.classList.remove('error');
                    }, 3000);
                    return;
                }

                const formattedPhone = '254' + phone;
                console.log('Formatted phone for API:', formattedPhone);

                if (!selectedService) {
                    showToast('No service selected', 'error');
                    return;
                }

                if (isProcessingPayment) return;

                const token = await requireAuthToken();
                if (!token) return;

                isProcessingPayment = true;
                confirmAttempted = false;
                pollingAttempts = 0;
                if (payBtn) {
                    payBtn.disabled = true;
                    payBtn.textContent = '⏳ Processing...';
                }

                const overlay = document.getElementById('paymentOverlay');
                const spinner = document.getElementById('paymentSpinner');
                if (overlay) {
                    if (spinner) spinner.style.display = 'block';
                    document.getElementById('paymentStatusText').textContent = 'Initiating M-Pesa payment...';
                    document.getElementById('paymentStatusDetail').textContent = 'Please wait...';
                    overlay.classList.add('open');
                }

                const requestBody = {
                    phone: formattedPhone,
                    amount: selectedService.price || 0,
                    account_reference: selectedService.id + '-' + Date.now(),
                    description: `Auto-D: ${selectedService.name}`
                };

                try {
                    // ─── ─── FIX: Use the custom domain API_BASE ───
                    const response = await fetch(`${API_BASE}/mpesa/stkpush`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(requestBody)
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        if (response.status === 401) {
                            showToast('⚠️ Your session has expired. Please log in again.', 'error');
                            setTimeout(() => {
                                window.location.href = 'https://auto-d.meipressgroup.com/';
                            }, 1500);
                            return;
                        }
                        throw new Error(data.message || data.error || 'Payment initiation failed');
                    }

                    const checkoutId = data.checkout_request_id || data.checkoutRequestID;
                    checkoutRequestId = checkoutId;

                    if (supabaseClient && currentUser) {
                        try {
                            await supabaseClient
                                .from('payments')
                                .insert({
                                    user_id: currentUser.id,
                                    checkout_request_id: checkoutId,
                                    service_id: selectedService.id,
                                    service_name: selectedService.name,
                                    amount: selectedService.price,
                                    phone: formattedPhone,
                                    status: 'pending',
                                    created_at: new Date().toISOString()
                                });
                        } catch (e) {
                            console.warn('Could not save transaction:', e);
                        }
                    }

                    if (overlay) {
                        document.getElementById('paymentStatusText').textContent = '📱 STK Push Sent!';
                        document.getElementById('paymentStatusDetail').textContent = 'Please check your phone and enter your M-Pesa PIN.';
                    }
                    showToast('📱 STK Push sent! Check your phone.', 'info');

                    // ─── Poll with timeout ───
                    if (pollTimer) {
                        clearInterval(pollTimer);
                        pollTimer = null;
                    }
                    
                    pollingAttempts = 0;
                    
                    pollTimer = setInterval(async () => {
                        pollingAttempts++;
                        
                        if (pollingAttempts > MAX_POLLING_ATTEMPTS) {
                            clearInterval(pollTimer);
                            pollTimer = null;
                            if (overlay && !confirmAttempted) {
                                confirmAttempted = true;
                                document.getElementById('paymentStatusText').textContent = '⏰ Timeout';
                                document.getElementById('paymentStatusDetail').innerHTML = `
                                    <div style="display:flex;flex-direction:column;gap:12px;align-items:center;max-width:300px;">
                                        <p style="font-size:14px;color:var(--text-secondary);">
                                            Check your M-Pesa messages.
                                        </p>
                                        <button onclick="window.manualUnlock('${checkoutId}', '${selectedService.id}')" 
                                                style="padding:14px 28px;background:var(--primary);color:#0f172a;border:none;border-radius:10px;font-weight:700;font-size:16px;cursor:pointer;width:100%;">
                                            ✅ I've Completed Payment
                                        </button>
                                    </div>
                                `;
                                if (spinner) spinner.style.display = 'none';
                            }
                            showToast('⏰ Payment timeout. Check your M-Pesa.', 'warning');
                            return;
                        }

                        try {
                            const pollToken = await getAuthToken();
                            
                            // ─── ─── FIX: Status endpoint no auth needed ───
                            const headers = {
                                'Accept': 'application/json'
                            };
                            if (pollToken) {
                                headers['Authorization'] = `Bearer ${pollToken}`;
                            }
                            
                            const statusResponse = await fetch(`${API_BASE}/mpesa/status/${checkoutId}`, {
                                headers: headers
                            });

                            // ─── ─── FIX: Handle 401/403 as "still processing" ───
                            if (statusResponse.status === 401 || statusResponse.status === 403) {
                                console.log(`⚠️ Status check #${pollingAttempts}: Authentication issue, trying again...`);
                                if (pollingAttempts > 10 && !confirmAttempted) {
                                    confirmAttempted = true;
                                    if (overlay) {
                                        document.getElementById('paymentStatusText').textContent = '⏳ Waiting for confirmation';
                                        document.getElementById('paymentStatusDetail').innerHTML = `
                                            <div style="display:flex;flex-direction:column;gap:12px;align-items:center;max-width:300px;">
                                                <p style="font-size:14px;color:var(--text-secondary);">
                                                    We're having trouble confirming your payment automatically.
                                                </p>
                                                <p style="font-size:13px;color:var(--text-muted);">
                                                    If you've already entered your M-Pesa PIN, click below.
                                                </p>
                                                <button onclick="window.manualUnlock('${checkoutId}', '${selectedService.id}')" 
                                                        style="padding:14px 28px;background:var(--success);color:#000;border:none;border-radius:10px;font-weight:700;font-size:16px;cursor:pointer;width:100%;">
                                                    ✅ I've Completed Payment
                                                </button>
                                                <small style="font-size:11px;color:var(--text-muted);">
                                                    If you haven't paid, please check your phone and enter your PIN.
                                                </small>
                                            </div>
                                        `;
                                        if (spinner) spinner.style.display = 'none';
                                    }
                                }
                                return;
                            }

                            if (statusResponse.status === 404) {
                                console.log(`⏳ Status check #${pollingAttempts}: Still processing...`);
                                
                                if (pollingAttempts > 10 && !confirmAttempted) {
                                    confirmAttempted = true;
                                    if (overlay) {
                                        document.getElementById('paymentStatusText').textContent = '⏳ Waiting for confirmation';
                                        document.getElementById('paymentStatusDetail').innerHTML = `
                                            <div style="display:flex;flex-direction:column;gap:12px;align-items:center;max-width:300px;">
                                                <p style="font-size:14px;color:var(--text-secondary);">
                                                    We're having trouble confirming your payment automatically.
                                                </p>
                                                <p style="font-size:13px;color:var(--text-muted);">
                                                    If you've already entered your M-Pesa PIN, click below.
                                                </p>
                                                <button onclick="window.manualUnlock('${checkoutId}', '${selectedService.id}')" 
                                                        style="padding:14px 28px;background:var(--success);color:#000;border:none;border-radius:10px;font-weight:700;font-size:16px;cursor:pointer;width:100%;">
                                                    ✅ I've Completed Payment
                                                </button>
                                                <small style="font-size:11px;color:var(--text-muted);">
                                                    If you haven't paid, please check your phone and enter your PIN.
                                                </small>
                                            </div>
                                        `;
                                        if (spinner) spinner.style.display = 'none';
                                    }
                                }
                                return;
                            }

                            if (!statusResponse.ok) {
                                const errData = await statusResponse.json().catch(() => ({}));
                                console.warn('Status check error:', errData);
                                return;
                            }

                            const statusData = await statusResponse.json();
                            
                            if (statusData.status === 'success' || statusData.status === 'completed' || statusData.status === 'paid') {
                                clearInterval(pollTimer);
                                pollTimer = null;
                                
                                const serviceId = pendingServiceRedirect || selectedService.id;

                                if (overlay) {
                                    document.getElementById('paymentStatusText').textContent = '✅ Payment Successful!';
                                    document.getElementById('paymentStatusDetail').textContent = 'Unlocking service...';
                                }

                                const unlocked = await unlockServiceViaConfirm(checkoutId, serviceId);

                                if (unlocked) {
                                    showToast(`✅ ${selectedService.name} unlocked!`, 'success');
                                    if (overlay) {
                                        document.getElementById('paymentStatusText').textContent = '✅ Service Unlocked!';
                                        document.getElementById('paymentStatusDetail').textContent = 'Opening service now...';
                                        if (spinner) spinner.style.display = 'none';
                                        document.getElementById('paymentStatusText').innerHTML = '✅ Service Unlocked! 🎉';
                                    }
                                    setTimeout(() => {
                                        if (overlay) overlay.classList.remove('open');
                                        closePaymentModal();
                                        updateWorkflowStep(4);
                                        redirectToService(serviceId);
                                    }, 1000);
                                } else {
                                    const hasAccess = await checkServiceAccess(serviceId);
                                    if (hasAccess) {
                                        if (dashboardData && dashboardData.services) {
                                            const svc = dashboardData.services.find(s => s.id === serviceId);
                                            if (svc) svc.purchased = true;
                                        }
                                        showToast(`✅ ${selectedService.name} unlocked!`, 'success');
                                        if (overlay) {
                                            document.getElementById('paymentStatusText').textContent = '✅ Service Unlocked!';
                                            document.getElementById('paymentStatusDetail').textContent = 'Opening service now...';
                                            if (spinner) spinner.style.display = 'none';
                                            document.getElementById('paymentStatusText').innerHTML = '✅ Service Unlocked! 🎉';
                                        }
                                        setTimeout(() => {
                                            if (overlay) overlay.classList.remove('open');
                                            closePaymentModal();
                                            updateWorkflowStep(4);
                                            redirectToService(serviceId);
                                        }, 1000);
                                    } else {
                                        if (overlay) {
                                            document.getElementById('paymentStatusText').textContent = '⚠️ Payment Received';
                                            document.getElementById('paymentStatusDetail').innerHTML = `
                                                Service unlock pending. Click below to retry.<br>
                                                <button onclick="window.manualUnlock('${checkoutId}', '${selectedService.id}')" 
                                                        style="padding:10px 20px;background:var(--primary);color:#0f172a;border:none;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;margin-top:10px;">
                                                    🔄 Retry Unlock
                                                </button>
                                            `;
                                            if (spinner) spinner.style.display = 'none';
                                        }
                                        showToast('Payment received, but unlock is pending. Please retry.', 'warning');
                                    }
                                }
                                return;
                            } else if (statusData.status === 'failed' || statusData.status === 'error') {
                                clearInterval(pollTimer);
                                pollTimer = null;
                                if (overlay) {
                                    document.getElementById('paymentStatusText').textContent = '❌ Payment Failed';
                                    document.getElementById('paymentStatusDetail').textContent = statusData.description || statusData.message || 'Please try again.';
                                    if (spinner) spinner.style.display = 'none';
                                }
                                showToast('❌ Payment failed. Please try again.', 'error');
                                setTimeout(() => {
                                    if (overlay) overlay.classList.remove('open');
                                    closePaymentModal();
                                }, 2000);
                                return;
                            }

                            if (pollingAttempts % 5 === 0 && overlay) {
                                document.getElementById('paymentStatusDetail').textContent = `Waiting for confirmation... (${Math.round(pollingAttempts * 2)}s)`;
                            }

                        } catch (pollError) {
                            console.warn('Polling error:', pollError);
                        }
                    }, 2000);

                } catch (error) {
                    console.error('Payment error:', error);
                    if (overlay) {
                        document.getElementById('paymentStatusText').textContent = '❌ Payment Error';
                        document.getElementById('paymentStatusDetail').textContent = error.message || 'Please try again.';
                        if (spinner) spinner.style.display = 'none';
                    }
                    showToast('❌ Payment error: ' + error.message, 'error');
                    setTimeout(() => {
                        if (overlay) overlay.classList.remove('open');
                        closePaymentModal();
                    }, 2000);
                } finally {
                    isProcessingPayment = false;
                    if (payBtn) {
                        payBtn.disabled = false;
                        payBtn.textContent = '💳 Pay Now';
                    }
                }
            };

            // ─── Unlock Service ──────────────────────────────────────────
            async function unlockServiceViaConfirm(checkoutId, serviceId) {
                try {
                    const token = await getAuthToken();
                    if (!token) {
                        console.warn('No token for confirm');
                        return false;
                    }

                    const response = await fetch(`${API_BASE}/mpesa/confirm/${checkoutId}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    const data = await response.json().catch(() => ({}));
                    
                    if (response.ok && data.success === true) {
                        if (dashboardData && dashboardData.services) {
                            const svc = dashboardData.services.find(s => s.id === serviceId);
                            if (svc) svc.purchased = true;
                        }
                        return true;
                    }
                    
                    console.warn('Confirm response:', data);
                    return false;
                } catch (err) {
                    console.warn('Confirm request failed:', err);
                    return false;
                }
            }

            async function checkServiceAccess(serviceId) {
                try {
                    const token = await getAuthToken();
                    if (!token) return false;

                    const response = await fetch(`${API_BASE}/mpesa/user/services/${serviceId}/status`, {
                        headers: {
                            'Accept': 'application/json',
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (!response.ok) return false;
                    const data = await response.json();
                    return data.has_access === true || data.status === 'active' || data.purchased === true;
                } catch (err) {
                    console.warn('Service access check failed:', err);
                    return false;
                }
            }

            // ─── Manual Unlock ────────────────────────────────────────────
            window.manualUnlock = async function(checkoutId, serviceId) {
                const overlay = document.getElementById('paymentOverlay');
                const spinner = document.getElementById('paymentSpinner');
                
                try {
                    if (overlay) {
                        if (spinner) spinner.style.display = 'block';
                        document.getElementById('paymentStatusText').textContent = 'Confirming payment...';
                        document.getElementById('paymentStatusDetail').textContent = 'Please wait...';
                    }

                    const unlocked = await unlockServiceViaConfirm(checkoutId, serviceId);

                    if (unlocked) {
                        if (overlay) {
                            document.getElementById('paymentStatusText').textContent = '✅ Service Unlocked!';
                            document.getElementById('paymentStatusDetail').textContent = 'Opening service now...';
                            if (spinner) spinner.style.display = 'none';
                            document.getElementById('paymentStatusText').innerHTML = '✅ Service Unlocked! 🎉';
                        }
                        showToast('✅ Payment confirmed! Service unlocked!', 'success');
                        updateWorkflowStep(4);

                        setTimeout(() => {
                            if (overlay) overlay.classList.remove('open');
                            closePaymentModal();
                            redirectToService(pendingServiceRedirect || serviceId);
                        }, 1000);
                    } else {
                        const hasAccess = await checkServiceAccess(serviceId);
                        if (hasAccess) {
                            if (dashboardData && dashboardData.services) {
                                const svc = dashboardData.services.find(s => s.id === serviceId);
                                if (svc) svc.purchased = true;
                            }
                            if (overlay) {
                                document.getElementById('paymentStatusText').textContent = '✅ Service Unlocked!';
                                document.getElementById('paymentStatusDetail').textContent = 'Opening service now...';
                                if (spinner) spinner.style.display = 'none';
                                document.getElementById('paymentStatusText').innerHTML = '✅ Service Unlocked! 🎉';
                            }
                            showToast('✅ Service unlocked!', 'success');
                            setTimeout(() => {
                                if (overlay) overlay.classList.remove('open');
                                closePaymentModal();
                                redirectToService(pendingServiceRedirect || serviceId);
                            }, 1000);
                        } else {
                            if (overlay) {
                                document.getElementById('paymentStatusText').textContent = '⚠️ Unable to Unlock';
                                document.getElementById('paymentStatusDetail').textContent = 'Please contact support if you were charged.';
                                if (spinner) spinner.style.display = 'none';
                            }
                            showToast('⚠️ Could not unlock service. Please contact support.', 'error');
                        }
                    }
                } catch (error) {
                    console.error('Manual unlock error:', error);
                    if (overlay) {
                        document.getElementById('paymentStatusText').textContent = '❌ Error';
                        document.getElementById('paymentStatusDetail').textContent = error.message || 'Please try again.';
                        if (spinner) spinner.style.display = 'none';
                    }
                    showToast('❌ Failed to unlock service: ' + error.message, 'error');
                }
            };

            // ============================================================
            // INIT
            // ============================================================

            (async function() {
                console.log('🚗 Auto-D Kenya Dashboard');
                console.log('📋 API Base:', API_BASE);
                console.log('📋 Phone format: 07XXXXXXXX (10 digits starting with 0)');

                initSupabase();

                const isAuthenticated = await checkAuth();

                if (!isAuthenticated) {
                    showToast('Please sign in to access your dashboard', 'warning');
                    setTimeout(() => {
                        window.location.href = 'https://auto-d.meipressgroup.com/';
                    }, 1500);
                    return;
                }

                await loadDashboard();
                updateWorkflowStep(1);

                if (supabaseClient) {
                    supabaseClient.auth.onAuthStateChange((event, session) => {
                        if (event === 'SIGNED_OUT') {
                            window.location.href = 'https://auto-d.meipressgroup.com/';
                        } else if (event === 'SIGNED_IN' && session?.user) {
                            currentUser = session.user;
                            const userData = {
                                ...session.user,
                                access_token: session.access_token
                            };
                            localStorage.setItem('auto_d_user', JSON.stringify(userData));
                            updateUserUI();
                            loadDashboard();
                        }
                    });
                }
            })();

        })();
    </script>
