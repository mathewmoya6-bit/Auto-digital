# render.yaml
services:
  - type: web
    name: auto-d-api
    runtime: python
    repo: https://github.com/mathewmoya6-bit/Auto-digital
    plan: free
    region: oregon
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: |
      cd backend
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        value: https://xgkdbithhlvoqjnqvfmj.supabase.co
      - key: SUPABASE_KEY
        sync: false  # This will be set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render will generate a random secret
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: BACKEND_CORS_ORIGINS
        value: '["https://auto-digital.onrender.com", "https://auto-d-frontend.onrender.com"]'
      - key: API_V1_PREFIX
        value: /api/v1
      - key: PROJECT_NAME
        value: Auto-D API
