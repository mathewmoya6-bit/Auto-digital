services:
  - type: web
    name: auto-d-kenya
    runtime: python
    repo: https://github.com/your-username/your-repo  # optional
    plan: starter
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: CONSUMER_KEY
        sync: false
      - key: CONSUMER_SECRET
        sync: false
      - key: PASSKEY
        sync: false
      - key: SHORT_CODE
        sync: false
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --config gunicorn.conf.py
