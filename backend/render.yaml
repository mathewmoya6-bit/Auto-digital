# render.yaml - Auto-D Kenya Backend Deployment

services:
  - type: web
    name: auto-d-kenya-backend
    runtime: python
    plan: free  # Change to "starter" or "pro" for production
    region: frankfurt  # Choose closest to your users
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers=4 --threads=2 --bind=0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_APP
        value: app.py
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        value: https://auto-d.meipressgroup.com,https://auto-d.meipressgroup.com
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: MPESA_CONSUMER_KEY
        sync: false  # Set manually in Render dashboard
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_ENVIRONMENT
        value: production
      - key: MPESA_CALLBACK_URL
        value: https://auto-d-kenya-backend.onrender.com/api/mpesa/callback
      - key: LOG_LEVEL
        value: INFO

  # Optional: Add a PostgreSQL database if needed
  # - type: pgsql
  #   name: auto-d-db
  #   plan: free
  #   region: frankfurt
