# render.yaml - Auto-D Kenya Backend Deployment (FastAPI + Supabase)

services:
  - type: web
    name: auto-d-kenya-backend
    runtime: python
    plan: free
    region: frankfurt
    
    # ─── SPECIFY PYTHON VERSION ──────────────────────────────────────
    # Render will use the version specified in runtime.txt
    # but we can also specify it here
    pythonVersion: 3.11.0
    
    # ─── BUILD COMMAND ────────────────────────────────────────────────
    buildCommand: |
      cd backend
      python -m pip install --upgrade pip
      pip install --no-cache-dir -r requirements.txt
    
    # ─── START COMMAND ────────────────────────────────────────────────
    startCommand: |
      cd backend
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    
    # ─── ENVIRONMENT VARIABLES ────────────────────────────────────────
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      
      - key: ENVIRONMENT
        value: production
      
      - key: DEBUG
        value: false
      
      - key: PORT
        value: 10000
      
      - key: PROJECT_NAME
        value: Auto-D Kenya API
      
      - key: API_V1_PREFIX
        value: /api/v1
      
      # ─── SUPABASE CONFIGURATION ────────────────────────────────────
      - key: SUPABASE_URL
        value: https://xgkdbithhlvoqjnqvfmj.supabase.co
      
      - key: SUPABASE_KEY
        sync: false
      
      # ─── JWT AUTHENTICATION ────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
      
      - key: JWT_ALGORITHM
        value: HS256
      
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      
      # ─── CORS CONFIGURATION ────────────────────────────────────────
      - key: BACKEND_CORS_ORIGINS
        value: '["https://auto-d.meipressgroup.com", "https://auto-d-kenya-backend.onrender.com", "http://localhost:3000", "http://localhost:5173"]'
      
      # ─── LOGGING ─────────────────────────────────────────────────────
      - key: LOG_LEVEL
        value: INFO
      
      # ─── MPESA ──────────────────────────────────────────────────────
      - key: MPESA_CONSUMER_KEY
        sync: false
      
      - key: MPESA_CONSUMER_SECRET
        sync: false
      
      - key: MPESA_PASSKEY
        sync: false
      
      - key: MPESA_SHORTCODE
        sync: false
      
      - key: MPESA_ENVIRONMENT
        value: production
      
      - key: MPESA_CALLBACK_URL
        value: https://auto-d-kenya-backend.onrender.com/api/v1/mpesa/callback
      
      # ─── PERFORMANCE ──────────────────────────────────────────────
      - key: WORKERS
        value: 2  # Reduced for free tier
      
      - key: TIMEOUT
        value: 120
      
      - key: KEEPALIVE
        value: 5
      
      # ─── MAINTENANCE ──────────────────────────────────────────────
      - key: MAINTENANCE_MODE
        value: false
      
      # ─── HEALTH CHECK ──────────────────────────────────────────────
      - key: HEALTH_CHECK_PATH
        value: /health
