<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In | Auto-D Kenya</title>
    <meta name="description" content="Log in to your Auto-D Kenya account to access your vehicle dashboard." />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#0b1120" />

    <link rel="manifest" href="site.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Auto-D" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23eab308' rx='20'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle' fill='%23000'%3E🚗%3C/text%3E%3C/svg%3E" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="preconnect" href="https://xgkdbithhlvoqjnqvfmj.supabase.co" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          integrity="sha512-1PKOgIY59xJ8Co8+NE6FZ+LOAZKjy+KY8iq0G4B3CyeY6wYHN3yt9zzTncjzn70RmSVE0Q/T6UDVGqYVmDx2mA=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :focus-visible { outline: 2px solid #eab308; outline-offset: 3px; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b1120;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            padding: 16px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 800;
            color: #eab308;
            text-decoration: none;
        }
        .navbar .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .navbar .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .navbar .nav-links a:hover {
            color: #eab308;
        }
        .auth-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .auth-card h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 6px;
            color: #f8fafc;
        }
        .auth-card .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            padding: 12px 14px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .field input:focus {
            border-color: #eab308;
            outline: none;
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.12);
        }
        .field input::placeholder {
            color: #64748b;
        }
        .field .input-error {
            border-color: #ef4444;
        }
        .field .input-error:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12);
        }
        .error-msg {
            display: none;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 18px;
        }
        .error-msg.show { display: block; }
        .btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #eab308, #ca8a04);
            color: #0a0c15;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(234, 179, 8, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .btn-primary .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0,0,0,0.1);
            border-top-color: #0a0c15;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .switch-link {
            text-align: center;
            margin-top: 22px;
            font-size: 13px;
            color: #94a3b8;
        }
        .switch-link a {
            color: #eab308;
            text-decoration: none;
            font-weight: 600;
        }
        .switch-link a:hover { text-decoration: underline; }
        .back-home {
            text-align: center;
            margin-top: 14px;
        }
        .back-home a {
            color: #64748b;
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-home a:hover { color: #94a3b8; }

        /* ─── Toast ──────────────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 9999;
            font-weight: 500;
            animation: slideIn 0.3s ease;
            max-width: 380px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .toast-success { background: #22c55e; color: #000; }
        .toast-error { background: #ef4444; color: #fff; }
        .toast-warning { background: #eab308; color: #000; }
        .toast-info { background: #3b82f6; color: #fff; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 480px) {
            .navbar { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
            .navbar .nav-links { gap: 12px; }
            .navbar .nav-links a { font-size: 12px; }
            .auth-card { padding: 28px 20px; }
            .auth-card h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo"><span aria-hidden="true">🚗</span> Auto-D Kenya</a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="signup.html">Sign Up</a>
    </div>
</nav>

<main class="auth-wrap">
    <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="subtitle">Log in to view your vehicle dashboard.</p>

        <div class="error-msg" id="errorMsg" role="alert"></div>

        <form id="loginForm" novalidate>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">Log In</button>
        </form>

        <p class="switch-link">Don't have an account? <a href="signup.html">Sign up</a></p>
        <p class="back-home"><a href="index.html">&larr; Back to home</a></p>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (function() {
        'use strict';

        // ─── CONFIG ──────────────────────────────────────────────────
        const SUPABASE_URL = 'https://xgkdbithhlvoqjnqvfmj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhna2RiaXRoaGx2b3FqbnF2Zm1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NTE4NzQsImV4cCI6MjA5ODIyNzg3NH0.-4P2aQAlDl_4oW0C18gh7cEBzoIKeiLUmMnITz-Nt9Y';

        // ─── STATE ──────────────────────────────────────────────────
        let supabaseClient = null;
        let redirectUrl = 'dashboard.html';

        // ─── DOM REFS ──────────────────────────────────────────────
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');

        // ─── TOAST ──────────────────────────────────────────────────
        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // ─── SUPABASE INIT ─────────────────────────────────────────
        function initSupabase() {
            try {
                if (typeof supabase === 'undefined') {
                    throw new Error('Supabase SDK not loaded');
                }
                const { createClient } = supabase;
                supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    auth: {
                        persistSession: true,
                        autoRefreshToken: true,
                        detectSessionInUrl: true
                    }
                });
                console.log('✅ Supabase client initialized');
                return true;
            } catch (error) {
                console.warn('⚠️ Supabase init failed:', error.message);
                return false;
            }
        }

        // ─── CHECK IF LOGGED IN ────────────────────────────────────
        async function isLoggedIn() {
            try {
                const { data, error } = await supabaseClient.auth.getSession();
                if (error) throw error;
                return data.session !== null;
            } catch (error) {
                console.warn('⚠️ Session check failed:', error.message);
                return false;
            }
        }

        // ─── LOG IN ─────────────────────────────────────────────────
        async function logIn(email, password) {
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    if (error.message.includes('Invalid login credentials')) {
                        return { ok: false, error: 'Invalid email or password. Please try again.' };
                    }
                    if (error.message.includes('Email not confirmed')) {
                        return { ok: false, error: 'Please confirm your email address before logging in.' };
                    }
                    return { ok: false, error: error.message };
                }

                if (data.session) {
                    // Store session in localStorage for persistence
                    localStorage.setItem('access_token', data.session.access_token);
                    localStorage.setItem('refresh_token', data.session.refresh_token);
                    return { ok: true, session: data.session };
                }

                return { ok: false, error: 'Login failed. Please try again.' };

            } catch (error) {
                console.error('❌ Login error:', error);
                return { ok: false, error: 'An unexpected error occurred. Please try again.' };
            }
        }

        // ─── VALIDATE FORM ──────────────────────────────────────────
        function validateForm() {
            let isValid = true;
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Clear previous errors
            emailInput.classList.remove('input-error');
            passwordInput.classList.remove('input-error');

            if (!email) {
                emailInput.classList.add('input-error');
                isValid = false;
            } else if (!email.includes('@') || !email.includes('.')) {
                emailInput.classList.add('input-error');
                isValid = false;
            }

            if (!password || password.length < 6) {
                passwordInput.classList.add('input-error');
                isValid = false;
            }

            return isValid;
        }

        // ─── HANDLE FORM SUBMIT ─────────────────────────────────────
        async function handleSubmit(e) {
            e.preventDefault();
            errorMsg.classList.remove('show');

            if (!validateForm()) {
                errorMsg.textContent = 'Please fill in all fields correctly.';
                errorMsg.classList.add('show');
                return;
            }

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Logging in...';

            try {
                const result = await logIn(email, password);

                if (result.ok) {
                    showToast('✅ Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 500);
                } else {
                    errorMsg.textContent = result.error;
                    errorMsg.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Log In';
                }
            } catch (error) {
                console.error('❌ Login handler error:', error);
                errorMsg.textContent = 'An unexpected error occurred. Please try again.';
                errorMsg.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Log In';
            }
        }

        // ─── INIT ────────────────────────────────────────────────────
        async function init() {
            // Get redirect URL from query params
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get('redirect');
            if (redirect) {
                redirectUrl = redirect;
            }

            const supabaseOk = initSupabase();
            if (!supabaseOk) {
                errorMsg.textContent = 'Failed to initialize authentication. Please refresh the page.';
                errorMsg.classList.add('show');
                return;
            }

            // Check if already logged in
            try {
                const loggedIn = await isLoggedIn();
                if (loggedIn) {
                    // Redirect to dashboard
                    window.location.href = redirectUrl;
                    return;
                }
            } catch (error) {
                console.warn('⚠️ Session check failed:', error);
            }

            // Set up form submission
            form.addEventListener('submit', handleSubmit);

            // Real-time validation
            emailInput.addEventListener('input', function() {
                if (this.value.trim()) {
                    this.classList.remove('input-error');
                }
            });
            passwordInput.addEventListener('input', function() {
                if (this.value.length >= 6) {
                    this.classList.remove('input-error');
                }
            });

            console.log('✅ Login page initialized');
        }

        // ─── START ──────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', init);

    })();
</script>

</body>
</html>
