<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In | Auto-D Kenya</title>
    <meta name="description" content="Log in to your Auto-D Kenya account to access your vehicle dashboard." />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#0b1120" />

    <link rel="manifest" href="site.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Auto-D" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          integrity="sha512-1PKOgIY59xJ8Co8+NE6FZ+LOAZKjy+KY8iq0G4B3CyeY6wYHN3yt9zzTncjzn70RmSVE0Q/T6UDVGqYVmDx2mA=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :focus-visible { outline: 2px solid #eab308; outline-offset: 3px; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b1120;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            padding: 16px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 800;
            color: #eab308;
            text-decoration: none;
        }
        .auth-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 40px 32px;
        }
        .auth-card h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 6px;
        }
        .auth-card .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            padding: 12px 14px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 14px;
            font-family: inherit;
        }
        .field input:focus {
            border-color: #eab308;
            outline: none;
        }
        .error-msg {
            display: none;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 18px;
        }
        .error-msg.show { display: block; }
        .btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #eab308, #ca8a04);
            color: #0a0c15;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(234, 179, 8, 0.3);
        }
        .switch-link {
            text-align: center;
            margin-top: 22px;
            font-size: 13px;
            color: #94a3b8;
        }
        .switch-link a {
            color: #eab308;
            text-decoration: none;
            font-weight: 600;
        }
        .switch-link a:hover { text-decoration: underline; }
        .back-home {
            text-align: center;
            margin-top: 14px;
        }
        .back-home a {
            color: #64748b;
            font-size: 13px;
            text-decoration: none;
        }
        .back-home a:hover { color: #94a3b8; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo"><span aria-hidden="true">🚗</span> Auto-D Kenya</a>
</nav>

<main class="auth-wrap">
    <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="subtitle">Log in to view your vehicle dashboard.</p>

        <div class="error-msg" id="errorMsg" role="alert"></div>

        <form id="loginForm" novalidate>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="email" required />
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required />
            </div>
            <button type="submit" class="btn-primary">Log In</button>
        </form>

        <p class="switch-link">Don't have an account? <a href="signup.html">Sign up</a></p>
        <p class="back-home"><a href="index.html">&larr; Back to home</a></p>
    </div>
</main>

<script src="assets/auth.js"></script>
<script>
    (function () {
        'use strict';

        // Already logged in? Send straight to the intended page.
        var params = new URLSearchParams(location.search);
        var redirect = params.get('redirect') || 'dashboard.html';
        if (window.AutoDAuth.isLoggedIn()) {
            location.href = redirect;
            return;
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('service-worker.js').catch(function () {});
            });
        }

        var form = document.getElementById('loginForm');
        var errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;

            var result = window.AutoDAuth.logIn(email, password);
            if (result.ok) {
                location.href = redirect;
            } else {
                errorMsg.textContent = result.error;
                errorMsg.classList.add('show');
            }
        });
    })();
</script>

</body>
</html>
